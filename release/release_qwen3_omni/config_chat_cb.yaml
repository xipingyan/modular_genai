#
# Qwen3-Omni — Omni CB chat-history pipeline (full replay: image + video + audio + chat)
#
# Omni CB full replay contract:
#   - ChatHistory carries the full text history (including <image>/<video>/<audio> placeholders).
#     Text must NOT be passed via OmniInput.text in the generate(ChatHistory, OmniInput) overload.
#   - OmniInput provides the media-only payload; callers replay ALL media referenced in history
#     on every call. No hidden historical media cache.
#   - For text-only turns, OmniInput may be empty (images/video_frames/audios all unset).
#
# Data flow:
#   ParameterModule (chat_history, images, videos, audios, use_audio_in_video, text_streamer)
#     → ChatHistoryPromptBuilderModule  (chat_history → prompts)
#     → AudioPreprocessModule           (audios → input_features, feature_attention_mask)
#     → AudioEncoderModule              (→ audio_features, audio_feature_lengths)
#     → ImagePreprocessModule           (images → pixel_values, grid_thw, ...)
#     → VideoPreprocessModule           (videos → pixel_values, grid_thw, ...)
#     → TextEncoderModule(pre_templated=true)
#                                       (prompts + image/video/audio grids → input_ids, mask)
#     → VisionEncoderModule             (pixel_values + audio_features → visual/audio embeddings)
#     → TextEmbeddingModule             (input_ids → inputs_embeds)
#     → LLMEmbeddingFusionModule        (text + visual + audio embeds → merged_embeds)
#     → LLMInferenceCBModule            (merged_embeds path)
#     → ResultModule
global_context:
  model_type: "qwen3_omni"

pipeline_modules:

  pipeline_params:
    type: "ParameterModule"
    outputs:
      - name: "chat_history"
        type: "ChatHistory"
      - name: "images"
        type: "VecOVTensor"
      - name: "videos"
        type: "VecOVTensor"
      - name: "audios"
        type: "VecOVTensor"
      - name: "use_audio_in_video"
        type: "VecInt"
      - name: "text_streamer"
        type: "StreamerVariantPtr"

  chat_history_builder:
    type: "ChatHistoryPromptBuilderModule"
    inputs:
      - name: "chat_history"
        type: "ChatHistory"
        source: "pipeline_params.chat_history"
    outputs:
      - name: "prompts"
        type: "VecString"
    params:
      model_path: "./Qwen3-Omni-4B-Instruct-multilingual-int4"

  image_preprocessor:
    type: "ImagePreprocessModule"
    device: "GPU"
    inputs:
      - name: "images"
        type: "VecOVTensor"
        source: "pipeline_params.images"
    outputs:
      - name: "pixel_values"
        type: "VecOVTensor"
      - name: "grid_thw"
        type: "VecOVTensor"
      - name: "pos_embeds"
        type: "VecOVTensor"
      - name: "rotary_cos"
        type: "VecOVTensor"
      - name: "rotary_sin"
        type: "VecOVTensor"
    params:
      model_path: "./Qwen3-Omni-4B-Instruct-multilingual-int4"

  video_preprocessor:
    type: "VideoPreprocessModule"
    device: "GPU"
    inputs:
      - name: "videos"
        type: "VecOVTensor"
        source: "pipeline_params.videos"
    outputs:
      - name: "pixel_values"
        type: "VecOVTensor"
      - name: "grid_thw"
        type: "VecOVTensor"
      - name: "pos_embeds"
        type: "VecOVTensor"
      - name: "rotary_cos"
        type: "VecOVTensor"
      - name: "rotary_sin"
        type: "VecOVTensor"
      - name: "video_second_per_grid"
        type: "VecInt"
    params:
      model_path: "./Qwen3-Omni-4B-Instruct-multilingual-int4"

  audio_preprocessor:
    type: "AudioPreprocessModule"
    device: "GPU"
    inputs:
      - name: "audios"
        type: "VecOVTensor"
        source: "pipeline_params.audios"
    outputs:
      - name: "input_features"
        type: "VecOVTensor"
      - name: "feature_attention_mask"
        type: "VecOVTensor"
    params:
      model_path: "./Qwen3-Omni-4B-Instruct-multilingual-int4"

  audio_encoder:
    type: "AudioEncoderModule"
    device: "GPU"
    inputs:
      - name: "input_features"
        type: "VecOVTensor"
        source: "audio_preprocessor.input_features"
      - name: "feature_attention_mask"
        type: "VecOVTensor"
        source: "audio_preprocessor.feature_attention_mask"
    outputs:
      - name: "audio_features"
        type: "VecOVTensor"
      - name: "audio_feature_lengths"
        type: "OVTensor"
    params:
      model_path: "./Qwen3-Omni-4B-Instruct-multilingual-int4/qwen3_omni_audio_encoder_model.xml"

  prompt_encoder:
    type: "TextEncoderModule"
    device: "GPU"
    inputs:
      - name: "prompts"
        type: "VecString"
        source: "chat_history_builder.prompts"
      - name: "image_grid_thw"
        type: "VecOVTensor"
        source: "image_preprocessor.grid_thw"
      - name: "video_grid_thw"
        type: "VecOVTensor"
        source: "video_preprocessor.grid_thw"
      - name: "audio_features"
        type: "VecOVTensor"
        source: "audio_encoder.audio_features"
      - name: "video_second_per_grid"
        type: "VecInt"
        source: "video_preprocessor.video_second_per_grid"
      - name: "use_audio_in_video"
        type: "VecInt"
        source: "pipeline_params.use_audio_in_video"
    outputs:
      - name: "input_ids"
        type: "OVTensor"
      - name: "mask"
        type: "OVTensor"
    params:
      model_path: "./Qwen3-Omni-4B-Instruct-multilingual-int4"
      pre_templated: "true"

  vision_encoder:
    type: "VisionEncoderModule"
    device: "GPU"
    inputs:
      - name: "preprocessed_image"
        type: "VecOVTensor"
        source: "image_preprocessor.pixel_values"
      - name: "image_grid_thw"
        type: "VecOVTensor"
        source: "image_preprocessor.grid_thw"
      - name: "image_pos_embeds"
        type: "VecOVTensor"
        source: "image_preprocessor.pos_embeds"
      - name: "image_rotary_cos"
        type: "VecOVTensor"
        source: "image_preprocessor.rotary_cos"
      - name: "image_rotary_sin"
        type: "VecOVTensor"
        source: "image_preprocessor.rotary_sin"
      - name: "preprocessed_video"
        type: "VecOVTensor"
        source: "video_preprocessor.pixel_values"
      - name: "video_grid_thw"
        type: "VecOVTensor"
        source: "video_preprocessor.grid_thw"
      - name: "video_pos_embeds"
        type: "VecOVTensor"
        source: "video_preprocessor.pos_embeds"
      - name: "video_rotary_cos"
        type: "VecOVTensor"
        source: "video_preprocessor.rotary_cos"
      - name: "video_rotary_sin"
        type: "VecOVTensor"
        source: "video_preprocessor.rotary_sin"
      - name: "input_ids"
        type: "OVTensor"
        source: "prompt_encoder.input_ids"
      - name: "attention_mask"
        type: "OVTensor"
        source: "prompt_encoder.mask"
      - name: "audio_features"
        type: "VecOVTensor"
        source: "audio_encoder.audio_features"
      - name: "audio_feature_lengths"
        type: "OVTensor"
        source: "audio_encoder.audio_feature_lengths"
    outputs:
      - name: "image_embedding"
        type: "OVTensor"
      - name: "visual_pos_mask"
        type: "OVTensor"
      - name: "position_ids"
        type: "OVTensor"
      - name: "rope_delta"
        type: "OVTensor"
      - name: "deepstack_embeds"
        type: "VecOVTensor"
      - name: "audio_embedding"
        type: "OVTensor"
      - name: "audio_pos_mask"
        type: "OVTensor"
    params:
      model_path: "./Qwen3-Omni-4B-Instruct-multilingual-int4/qwen3_omni_vision_model.xml"
      vision_start_token_id: 248053

  text_embeds:
    type: "TextEmbeddingModule"
    device: "GPU"
    inputs:
      - name: "input_ids"
        type: "OVTensor"
        source: "prompt_encoder.input_ids"
    outputs:
      - name: "inputs_embeds"
        type: "OVTensor"
    params:
      model_path: "./Qwen3-Omni-4B-Instruct-multilingual-int4/openvino_text_embeddings_model.xml"

  merge_embeds:
    type: "LLMEmbeddingFusionModule"
    device: "GPU"
    inputs:
      - name: "text_embeds"
        type: "OVTensor"
        source: "text_embeds.inputs_embeds"
      - name: "visual_embeds"
        type: "OVTensor"
        source: "vision_encoder.image_embedding"
      - name: "visual_pos_mask"
        type: "OVTensor"
        source: "vision_encoder.visual_pos_mask"
      - name: "audio_features"
        type: "OVTensor"
        source: "vision_encoder.audio_embedding"
      - name: "audio_pos_mask"
        type: "OVTensor"
        source: "vision_encoder.audio_pos_mask"
    outputs:
      - name: "merged_embeds"
        type: "OVTensor"
    params:
      model_path: "./Qwen3-Omni-4B-Instruct-multilingual-int4/openvino_merge_embeds_model.xml"

  llm:
    type: "LLMInferenceCBModule"
    device: "GPU"
    inputs:
      - name: "inputs_embeds"
        type: "OVTensor"
        source: "merge_embeds.merged_embeds"
      - name: "visual_pos_mask"
        type: "OVTensor"
        source: "vision_encoder.visual_pos_mask"
      - name: "position_ids"
        type: "OVTensor"
        source: "vision_encoder.position_ids"
      - name: "rope_delta"
        type: "OVTensor"
        source: "vision_encoder.rope_delta"
      - name: "deepstack_embeds"
        type: "VecOVTensor"
        source: "vision_encoder.deepstack_embeds"
      - name: "text_streamer"
        type: "StreamerVariantPtr"
        source: "pipeline_params.text_streamer"
    outputs:
      - name: "generated_text"
        type: "String"
    params:
      model_path: "./Qwen3-Omni-4B-Instruct-multilingual-int4/qwen3_omni_text_model.xml"
      max_new_tokens: 128

  pipeline_result:
    type: "ResultModule"
    inputs:
      - name: "generated_text"
        type: "String"
        source: "llm.generated_text"
